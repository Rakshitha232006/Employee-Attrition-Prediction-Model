services:
  - type: web
    name: employee-attrition-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_SECRET
        generateValue: true

disks:
  - name: attrition-data
    mountPath: /opt/render/project/src/backend/data
    sizeGB: 1
